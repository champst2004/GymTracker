<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Attendance - GymTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">🏋️ FitTrack</div>
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="addMember.html">👤 Add Member</a>
            <a href="viewMembers.html">📋 View Members</a>
            <a href="addTrainer.html">🏃 Add Trainer</a>
            <a href="viewTrainers.html">📋 View Trainers</a>
            <a href="addSubscription.html">💳 Add Subscription</a>
            <a href="viewSubscriptions.html">📊 View Subscriptions</a>
            <a href="markAttendance.html" class="active">✅ Mark Attendance</a>
            <a href="viewAttendance.html">📅 View Attendance</a>
            <br>
            <a href="/GymTracker/logout" style="color:#8892a4;">🚪 Logout</a>
        </div>

        <div class="main-content">
            <div class="topbar">
                <h1>Mark Check-in</h1>
            </div>
            
            <div id="alertBox"></div>

            <div class="form-container">
                <form id="attendanceForm">
                    <div class="form-group">
                        <label>Member*</label>
                        <select id="memberId" required>
                            <!-- Populated via JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Check-in Time (Current)</label>
                        <input type="text" id="checkinTime" readonly>
                    </div>
                    
                    <button type="button" class="btn" onclick="mark()">Mark Check-In</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            populateDropdown("memberId", "/GymTracker/member?action=list", "memberId", "name", "Select Member");
            
            setInterval(() => {
                const now = new Date();
                document.getElementById("checkinTime").value = now.toLocaleString();
            }, 1000);
        });

        function mark() {
            const mId = document.getElementById("memberId").value;
            const mSelect = document.getElementById("memberId");
            const mName = mSelect.options[mSelect.selectedIndex].text;
            
            if(mId==="") {
                showAlert("Please select a member", "error");
                return;
            }
            
            fetch('/GymTracker/attendance', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `action=mark&memberId=${mId}`
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    showAlert(`Check-in recorded for ${mName} at ${document.getElementById('checkinTime').value}`, "success");
                    document.getElementById("memberId").value = "";
                } else {
                    showAlert("Failed to mark check-in: " + data.message, "error");
                }
            })
            .catch(e => showAlert("Error: " + e, "error"));
        }
    </script>
</body>
</html>
