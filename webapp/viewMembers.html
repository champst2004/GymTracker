<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Members - GymTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">🏋️ FitTrack</div>
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="addMember.html">👤 Add Member</a>
            <a href="viewMembers.html" class="active">📋 View Members</a>
            <a href="addTrainer.html">🏃 Add Trainer</a>
            <a href="viewTrainers.html">📋 View Trainers</a>
            <a href="addSubscription.html">💳 Add Subscription</a>
            <a href="viewSubscriptions.html">📊 View Subscriptions</a>
            <a href="markAttendance.html">✅ Mark Attendance</a>
            <a href="viewAttendance.html">📅 View Attendance</a>
            <br>
            <a href="/GymTracker/logout" style="color:#8892a4;">🚪 Logout</a>
        </div>

        <div class="main-content">
            <div class="topbar">
                <h1>View Members</h1>
            </div>
            
            <div id="alertBox"></div>
            
            <input type="text" id="searchBar" class="search-bar" placeholder="Search members by name or phone..." onkeyup="filterTable()">
            
            <div class="table-container">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Weight</th>
                            <th>Gender</th>
                            <th>Trainer</th>
                            <th>Join Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
                <p id="emptyMsg" style="display:none; text-align:center; padding:20px;">No members found.</p>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadMembers);

        function loadMembers() {
            fetch('/GymTracker/member?action=list')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById("tableBody");
                tbody.innerHTML = "";
                
                if (data.length === 0) {
                    document.getElementById("emptyMsg").style.display = "block";
                    return;
                }
                document.getElementById("emptyMsg").style.display = "none";

                data.forEach(m => {
                    const tr = document.createElement("tr");
                    const tName = (m.trainerName && m.trainerName !== "null") ? m.trainerName : "None";
                    tr.innerHTML = `
                        <td>${m.memberId}</td>
                        <td>${m.name}</td>
                        <td>${m.phone}</td>
                        <td>${m.email || '-'}</td>
                        <td>${m.weight}</td>
                        <td>${m.gender}</td>
                        <td>${tName}</td>
                        <td>${m.joinDate}</td>
                        <td>
                            <button class="btn btn-small btn-secondary" onclick="removeT(${m.memberId})">Rm Trainer</button>
                             <button class="btn btn-small" onclick="deleteM(${m.memberId})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        function removeT(id) {
            if(confirm("Remove assigned trainer?")) {
                fetch('/GymTracker/member?action=removeTrainer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `memberId=${id}`
                }).then(r=>r.json()).then(d => {
                    if(d.success) { showAlert("Trainer removed", "success"); loadMembers(); }
                });
            }
        }

        function deleteM(id) {
            if(confirm("Are you sure you want to delete this member?")) {
                fetch('/GymTracker/member?action=delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `id=${id}`
                }).then(r=>r.json()).then(d => {
                    if(d.success) { showAlert("Deleted successfully", "success"); loadMembers(); }
                });
            }
        }

        function filterTable() {
            const val = document.getElementById("searchBar").value.toLowerCase();
            const rows = document.getElementById("tableBody").getElementsByTagName("tr");
            for(let i=0; i<rows.length; i++) {
                let text = rows[i].innerText.toLowerCase();
                rows[i].style.display = text.includes(val) ? "" : "none";
            }
        }
    </script>
</body>
</html>
