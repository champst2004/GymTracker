<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Trainer - GymTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">🏋️ FitTrack</div>
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="addMember.html">👤 Add Member</a>
            <a href="viewMembers.html">📋 View Members</a>
            <a href="addTrainer.html" class="active">🏃 Add Trainer</a>
            <a href="viewTrainers.html">📋 View Trainers</a>
            <a href="addSubscription.html">💳 Add Subscription</a>
            <a href="viewSubscriptions.html">📊 View Subscriptions</a>
            <a href="markAttendance.html">✅ Mark Attendance</a>
            <a href="viewAttendance.html">📅 View Attendance</a>
            <br>
            <a href="/GymTracker/logout" style="color:#8892a4;">🚪 Logout</a>
        </div>

        <div class="main-content">
            <div class="topbar">
                <h1>Add New Trainer</h1>
            </div>
            
            <div id="alertBox"></div>

            <div class="form-container">
                <form id="trainerForm">
                    <div class="form-group">
                        <label>Name*</label>
                        <input type="text" id="name">
                        <span class="error-text" id="nameErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Phone* (10 digits)</label>
                        <input type="text" id="phone" maxlength="10">
                        <span class="error-text" id="phoneErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group">
                        <label>Specialization*</label>
                        <input type="text" id="specialization">
                        <span class="error-text" id="specErr"></span>
                    </div>
                    
                    <button type="button" class="btn" onclick="submitTrainer()">Save Trainer</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script>
        function submitTrainer() {
            if (!validateTrainerForm()) return;
            
            const params = new URLSearchParams({
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value,
                specialization: document.getElementById("specialization").value
            });

            fetch('/GymTracker/trainer?action=add', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: params
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    showAlert("Trainer added successfully!", "success");
                    document.getElementById("trainerForm").reset();
                } else {
                    showAlert("Failed to add trainer: " + data.message, "error");
                }
            })
            .catch(e => showAlert("Error: " + e, "error"));
        }
    </script>
</body>
</html>
