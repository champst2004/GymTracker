<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTracker - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>🏋️ GymTracker</h1>
        <div id="loginError" class="error-text" style="font-size:14px; margin-bottom:10px;"></div>
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="button" class="btn" style="width:100%" onclick="doLogin()">Login</button>
        </form>
    </div>
    
    <script src="js/validation.js"></script>
    <script>
        function doLogin() {
            if (!validateLoginForm()) return;
            
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            
            fetch('/GymTracker/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({username: u, password: p})
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    window.location.href = "dashboard.html";
                } else {
                    document.getElementById("loginError").innerText = data.message;
                }
            })
            .catch(console.error);
        }
    </script>
</body>
</html>
